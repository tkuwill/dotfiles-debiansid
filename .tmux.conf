# start the shell for each new window
set -g set-titles on
set -g set-titles-string '#{pane_current_command} - #T'
set -g default-terminal "screen-256color"
set -g history-limit 30000

# Enable mouse 
set -g mouse on

## Use vim keybindings in copy mode (can use <C-b-]> to paste)
setw -g mode-keys vi
set-option -s set-clipboard off
bind-key -T copy-mode-vi v send-keys -X begin-selection
unbind -T copy-mode-vi Enter

# --- 剪貼簿修正（針對 XFCE / X11 環境） ---
# 1. 在 Vi 模式下按 'y' 複製並同步到 X11 主剪貼簿（clipboard）與選取剪貼簿（primary）
# bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'xclip -in -selection clipboard -filter | xclip -in -selection primary'

# 2. 快捷鍵 Ctrl-b 接著 Ctrl-v：從 X11 系統剪貼簿貼上到 tmux 視窗
# bind-key C-v run-shell 'xclip -out -selection clipboard | tmux load-buffer - \; paste-buffer -d'

# 3. 滑鼠拖曳選取完放開時，自動複製到 X11 系統剪貼簿
# bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# --- Wayland 備用註解（未來若切換到 labwc 時再把下方解開、上方註解掉即可） ---
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'wl-copy'
bind-key C-v run-shell 'wl-paste | tmux load-buffer - \; paste-buffer -d'
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"


#-- Statusbar -----------------------------------------------------------------

# Status refresh interval in seconds
set -g status-interval 1

# Default sb colours (256 -- love me some gray)
set -g status-bg colour254
set -g status-fg white

# Left shit (session name, bright blue)
set -g status-left '#[fg=colour21]Sess_#S'

# Right shit
set -g status-right '#[fg=blue,bright]%H:%M'

# Center windows
set-option -g status-justify centre

# windows status info config
setw -g window-status-current-style 'fg=colour11 bg=colour27 bold'
setw -g window-status-current-format 'Win_#I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '

setw -g window-status-style 'fg=colour14 bg=colour18'
setw -g window-status-format ' #I#[fg=colour249]:#[fg=colour250]#W#[fg=colour249]#F '
